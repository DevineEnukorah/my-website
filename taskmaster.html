<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TaskMaster AI</title>
        
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                darkMode: 'class',
                theme: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        </script>
        <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client?external=react",
                "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
            }
        }
        </script>
        <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
        <style>
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }
            ::-webkit-scrollbar { width: 8px; height: 8px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
            .dark ::-webkit-scrollbar-thumb { background: #334155; }
            body { 
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
        </style>
    </head>

    <body class="bg-slate-50 dark:bg-[#0B1120] text-slate-900 dark:text-slate-50 transition-colors duration-500 min-h-screen">
        <div id="root"></div>

        <script type="text/babel" data-type="module">
            import React, { useState, useEffect, useRef } from 'react';
            import { createRoot } from 'react-dom/client';
            import {
                Bot, Plus, Calendar, Tag, MoreVertical,
                CheckCircle, Clock, AlertCircle, Sparkles,
                Sun, Moon, X, Zap
            } from 'lucide-react';

            function App() {
                const [darkMode, setDarkMode] = useState(false);
                const [inputValue, setInputValue] = useState("");
                const [isProcessing, setIsProcessing] = useState(false);
                const [tasks, setTasks] = useState([
                    { id: 1, title: "Fix authentication state bug in production", category: "Work", priority: "High", status: "To Do" },
                    { id: 2, title: "Draft system architecture document", category: "Work", priority: "Medium", status: "In Progress" },
                    { id: 3, title: "Schedule quarterly sync with design team", category: "Communication", priority: "Low", status: "Done" },
                ]);

                useEffect(() => {
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        setDarkMode(true);
                    }
                }, []);

                useEffect(() => {
                    if (darkMode) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                }, [darkMode]);

                // SIMULATED AI LOGIC
                const handleAddTask = () => {
                    if (!inputValue.trim()) return;

                    setIsProcessing(true);

                    // Mock AI delay
                    setTimeout(() => {
                        let category = "General";
                        let priority = "Medium";
                        const text = inputValue.toLowerCase();

                        if (text.includes("bug") || text.includes("code") || text.includes("server") || text.includes("deploy") || text.includes("fix")) {
                            category = "Work";
                            priority = "High";
                        } else if (text.includes("buy") || text.includes("shop") || text.includes("grocer") || text.includes("clean")) {
                            category = "Personal";
                        } else if (text.includes("doctor") || text.includes("gym") || text.includes("health") || text.includes("workout")) {
                            category = "Health";
                            priority = "High";
                        } else if (text.includes("email") || text.includes("call") || text.includes("meet") || text.includes("sync")) {
                            category = "Communication";
                        }

                        const newTask = {
                            id: Date.now(),
                            title: inputValue,
                            category,
                            priority,
                            status: "To Do"
                        };

                        setTasks(prev => [newTask, ...prev]);
                        setInputValue("");
                        setIsProcessing(false);
                    }, 1200);
                };

                const handleKeyDown = (e) => {
                    if (e.key === 'Enter') handleAddTask();
                };

                const deleteTask = (id) => {
                    setTasks(tasks.filter(t => t.id !== id));
                };

                const TaskColumn = ({ title, status, icon: Icon, colorClass, borderClass }) => (
                    <div className="flex-1 min-w-[320px] bg-slate-100/50 dark:bg-slate-900/50 backdrop-blur-sm border border-slate-200/50 dark:border-slate-800/50 rounded-3xl p-5 flex flex-col h-[calc(100vh-280px)]">
                        <div className={`flex items-center gap-3 mb-6 pb-4 border-b-2 ${borderClass} opacity-90`}>
                            <Icon size={ 20 } className={ colorClass } />
                            <h3 className="font-extrabold text-sm uppercase tracking-widest text-slate-700 dark:text-slate-300">{ title }</h3>
                            <span className="ml-auto bg-white dark:bg-slate-800 font-bold text-xs px-3 py-1 rounded-full shadow-sm">
                                { tasks.filter(t => t.status === status).length }
                            </span>
                        </div>
                        <div className="flex-1 overflow-y-auto space-y-4 pr-1">
                            { tasks.filter(t => t.status === status).map(task => (
                                <div key={ task.id } className="bg-white dark:bg-slate-800 p-5 rounded-2xl shadow-sm border border-slate-200/50 dark:border-slate-700/50 hover:shadow-lg hover:border-indigo-500/30 transition-all duration-300 group animate-[fadeIn_0.4s_cubic-bezier(0.16,1,0.3,1)] transform hover:-translate-y-1">
                                    <div className="flex justify-between items-start mb-3">
                                        <span className={ `text-[11px] font-bold px-2.5 py-1 rounded-lg uppercase tracking-wider ${
                                            task.category === 'Work' ? 'bg-indigo-100 text-indigo-700 dark:bg-indigo-500/10 dark:text-indigo-400' :
                                            task.category === 'Personal' ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400' :
                                            task.category === 'Health' ? 'bg-rose-100 text-rose-700 dark:bg-rose-500/10 dark:text-rose-400' :
                                            task.category === 'Communication' ? 'bg-amber-100 text-amber-700 dark:bg-amber-500/10 dark:text-amber-400' :
                                            'bg-slate-100 text-slate-700 dark:bg-slate-700 dark:text-slate-300'
                                        }` }>
                                            { task.category }
                                        </span>
                                        <button onClick={ () => deleteTask(task.id) } className="text-slate-400 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-50 dark:bg-slate-900 p-1.5 rounded-md">
                                            <X size={ 14 } strokeWidth={3} />
                                        </button>
                                    </div>
                                    <p className="font-semibold text-[15px] leading-snug mb-5 text-slate-800 dark:text-slate-100">{ task.title }</p>
                                    <div className="flex items-center justify-between mt-auto border-t border-slate-100 dark:border-slate-700/50 pt-3">
                                        <div className="flex items-center gap-1.5">
                                            <div className={ `w-2 h-2 rounded-full ${
                                                task.priority === 'High' ? 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.6)]' :
                                                task.priority === 'Medium' ? 'bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.6)]' : 
                                                'bg-sky-500 shadow-[0_0_8px_rgba(14,165,233,0.6)]'
                                            }` }></div>
                                            <span className="text-xs font-semibold text-slate-500 dark:text-slate-400">{ task.priority } Priority</span>
                                        </div>
                                        <div className="flex gap-1">
                                            { status !== 'To Do' && <button onClick={ () => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: 'To Do' } : t)) } className="p-1.5 text-slate-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded-md transition-colors font-bold text-xs">←</button> }
                                            { status !== 'Done' && <button onClick={ () => setTasks(tasks.map(t => t.id === task.id ? { ...t, status: status === 'To Do' ? 'In Progress' : 'Done' } : t)) } className="p-1.5 text-slate-400 hover:text-indigo-500 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded-md transition-colors font-bold text-xs">→</button> }
                                        </div>
                                    </div>
                                </div>
                            )) }
                            { tasks.filter(t => t.status === status).length === 0 && (
                                <div className="text-center py-10 px-4 text-slate-400 dark:text-slate-500 text-sm font-medium border-2 border-dashed border-slate-200 dark:border-slate-700/70 rounded-2xl">
                                    No tasks in this column
                                </div>
                            ) }
                        </div>
                    </div>
                );

                return (
                    <div className="min-h-screen p-6 md:p-10 max-w-[1400px] mx-auto flex flex-col relative overflow-hidden">
                        
                        {/* Background Glows */}
                        <div className="fixed inset-0 z-[-1] pointer-events-none">
                            <div className="absolute top-[-10%] left-[20%] w-[40%] h-[40%] rounded-full bg-indigo-500/10 blur-[120px]"></div>
                        </div>

                        <header className="flex justify-between items-center mb-12">
                            <div className="flex items-center gap-4">
                                <div className="p-2.5 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl shadow-lg shadow-indigo-500/20">
                                    <Zap className="text-white fill-white" size={ 26 } />
                                </div>
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">TaskMaster AI</h1>
                                    <p className="text-sm font-semibold text-indigo-600 dark:text-indigo-400 mt-0.5">Smart NLP Task Categorization</p>
                                </div>
                            </div>
                            <button onClick={ () => setDarkMode(!darkMode) } className="p-3 rounded-xl bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 shadow-sm border border-slate-200/50 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
                                { darkMode ? <Sun size={ 22 } /> : <Moon size={ 22 } /> }
                            </button>
                        </header>

                        {/* AI Input Area */}
                        <div className="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl p-2 rounded-3xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200/80 dark:border-slate-700/80 mb-12 max-w-4xl mx-auto w-full relative z-10 transition-all focus-within:border-indigo-500/50 focus-within:ring-4 focus-within:ring-indigo-500/10">
                            <div className="relative flex items-center">
                                <div className="pl-6 pr-2 text-indigo-500">
                                    <Bot size={ 28 } />
                                </div>
                                <input
                                    type="text"
                                    value={ inputValue }
                                    onChange={ (e) => setInputValue(e.target.value) }
                                    onKeyDown={ handleKeyDown }
                                    placeholder="Tell AI what you need to do (e.g., 'Fix header bug' or 'Buy milk')..."
                                    className="w-full p-4 bg-transparent outline-none text-[17px] font-medium text-slate-900 dark:text-white placeholder-slate-400"
                                    disabled={ isProcessing }
                                />
                                <button
                                    onClick={ handleAddTask }
                                    disabled={ isProcessing || !inputValue.trim() }
                                    className={ `mr-2 px-8 py-3.5 rounded-2xl font-bold transition-all duration-300 flex items-center gap-2 ${isProcessing
                                        ? 'bg-slate-100 dark:bg-slate-700 text-slate-400 cursor-wait'
                                        : 'bg-gradient-to-r from-indigo-600 to-purple-600 text-white shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 hover:-translate-y-0.5'
                                        }` }
                                >
                                    { isProcessing ? (
                                        <><Sparkles size={ 20 } className="animate-spin" /> Processing...</>
                                    ) : (
                                        <><Plus size={ 20 } strokeWidth={3} /> Add Task</>
                                    ) }
                                </button>
                            </div>
                        </div>

                        {/* Kanban Board */}
                        <div className="flex-1 overflow-x-auto pb-4">
                            <div className="flex gap-6 min-w-full h-full">
                                <TaskColumn title="To Do" status="To Do" icon={ AlertCircle } colorClass="text-slate-500" borderClass="border-slate-300 dark:border-slate-600" />
                                <TaskColumn title="In Progress" status="In Progress" icon={ Clock } colorClass="text-indigo-500" borderClass="border-indigo-300 dark:border-indigo-500/50" />
                                <TaskColumn title="Done" status="Done" icon={ CheckCircle } colorClass="text-emerald-500" borderClass="border-emerald-300 dark:border-emerald-500/50" />
                            </div>
                        </div>
                    </div>
                );
            }

            const container = document.getElementById('root');
            const root = createRoot(container);
            root.render(<App />);
        </script>
    </body>

</html>
