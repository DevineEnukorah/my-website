        // Scroll Reveal Hook for modern entrance animations
        const useScrollReveal = () => {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('active');
                            observer.unobserve(entry.target);
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
                );
                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, []);
            return ref;
        };

        const Reveal = ({ children, className = "", delay = 0 }) => {
            const ref = useScrollReveal();
            return (

            constructor(props) {
                super(props);
                this.state = { hasError: false };

            static getDerivedStateFromError(error) { return { hasError: true }; }

                if (this.state.hasError) {
                    return <div className="min-h-screen flex items-center justify-center bg-slate-900 text-white font-mono">Something went wrong. Please refresh the page.</div>;
                }
                return this.props.children;
            }

                                                    <p className="text-slate-600 dark:text-slate-300">name: <span className="text-emerald-600 dark:text-emerald-400">"Devine Enukorah"</span>,</p>

                                                    <p className="text-slate-600 dark:text-slate-300">skills: [<span className="text-emerald-600 dark:text-emerald-400">"React"</span>, <span className="text-emerald-600 dark:text-emerald-400">"Node.js"</span>, <span className="text-emerald-600 dark:text-emerald-400">"TypeScript"</span>],</p>
                                                    <p className="text-slate-600 dark:text-slate-300 flex items-center gap-2">passion: <span className="text-rose-500">"Building great UI/UX"</span> <span className="text-xl">🚀</span></p>
                                                </div>
                                                <p className="text-slate-600 dark:text-slate-400">{ '};' }</p>
                                            </div>
                                        </div>
                                    </div>
                                </Reveal>

                            </div>
                            
                            {/* Scroll Down Indicator */}
                            <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce hidden lg:block text-slate-400">
                                <ChevronDown size={32} />
                            </div>
                        </section>

                        {}
                        {/* About */}
                        <section id="about" className="py-24 relative">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <Reveal>
                                    <SectionTitle subtitle="Get to know me">About Me</SectionTitle>
                                </Reveal>
                                
                                <div className="grid lg:grid-cols-12 gap-12 lg:gap-16 items-center mt-10">
                                    <Reveal delay={100} className="lg:col-span-5 relative group perspective">
                                        <div className="relative w-full max-w-sm mx-auto aspect-[4/5] rounded-3xl overflow-hidden shadow-2xl transition-transform duration-700 transform group-hover:rotate-y-12">
                                            {/* Accent Border Backdrop */}
                                            <div className="absolute inset-0 bg-gradient-to-tr from-indigo-500 to-purple-500 opacity-20 dark:opacity-40"></div>
                                            
                                            <div className="absolute inset-2 bg-slate-200 dark:bg-slate-800 rounded-2xl overflow-hidden flex items-center justify-center">
                                                {!isImageLoaded && <User size={64} className="text-slate-400 animate-pulse" />}
                                                <img 
                                                    src={darkMode ? "./images/Bless-Dark.png" : "./images/Bless-White.png"} 
                                                    alt="Devine Enukorah" 
                                                    className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-700 ${isImageLoaded ? 'opacity-100' : 'opacity-0'}`} 
                                                    onLoad={() => setIsImageLoaded(true)} 
                                                    onError={imageError ? null : () => setIsImageError(true)} 
                                                />
                                            </div>
                                        </div>
                                        {/* Decorative Dots */}
                                        <div className="absolute -z-10 top-10 -left-10 w-32 h-32 bg-[radial-gradient(#cbd5e1_2px,transparent_2px)] dark:bg-[radial-gradient(#334155_2px,transparent_2px)] [background-size:16px_16px] opacity-60"></div>
                                    </Reveal>

                                    <Reveal delay={250} className="lg:col-span-7 space-y-8">
                                        <h3 className="text-3xl font-bold text-slate-900 dark:text-white">
                                            I code, I create, I solve.
                                        </h3>
                                        <p className="text-lg text-slate-600 dark:text-slate-400 leading-relaxed">
                                            My journey began with standard "100 Days of Code" challenges, but what started as a simple curiosity quickly evolved into a full-blown career obsession. Today, I build comprehensive web applications that are as functionally robust as they are visually engaging.
                                        </p>
                                        <p className="text-lg text-slate-600 dark:text-slate-400 leading-relaxed">
                                            I specialize in bridging the gap between design and engineering, ensuring that the final product provides a seamless experience for end-users while maintaining clean, maintainable codebases under the hood.
                                        </p>
                                        
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-6 pt-6 border-t border-slate-200 dark:border-slate-800">
                                            <div>
                                                <p className="text-4xl font-extrabold text-indigo-600 dark:text-indigo-400 mb-2">2+</p>
                                                <p className="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Years Exp.</p>
                                            </div>
                                            <div>
                                                <p className="text-4xl font-extrabold text-indigo-600 dark:text-indigo-400 mb-2">20+</p>
                                                <p className="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Projects</p>
                                            </div>
                                            <div className="hidden sm:block">
                                                <p className="text-4xl font-extrabold text-indigo-600 dark:text-indigo-400 mb-2">100%</p>
                                                <p className="text-sm font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Commitment</p>
                                            </div>
                                        </div>
                                    </Reveal>
                                </div>
                            </div>
                        </section>

                        {}
                        {/* Skills */}
                        <section id="skills" className="py-24 bg-slate-100/50 dark:bg-slate-900/50 relative border-y border-slate-200/50 dark:border-slate-800/50">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <Reveal>
                                    <SectionTitle subtitle="What I do best">Technical Arsenal</SectionTitle>
                                </Reveal>
                                
                                <div className="grid md:grid-cols-3 gap-8 mt-10">
                                    {SKILLS.map((skillGroup, idx) => (
                                        <Reveal key={skillGroup.category} delay={idx * 150}>
                                            <div className="bg-white dark:bg-slate-800 rounded-3xl p-8 h-full shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-200 dark:border-slate-700 hover:-translate-y-2 transition-transform duration-300">
                                                <div className="flex flex-col items-center text-center mb-8">
                                                    <div className="w-16 h-16 bg-indigo-50 dark:bg-indigo-500/10 rounded-2xl flex items-center justify-center text-indigo-600 dark:text-indigo-400 mb-6 rotate-3">
                                                        <skillGroup.icon size={32} />
                                                    </div>
                                                    <h3 className="text-2xl font-bold text-slate-900 dark:text-white">{skillGroup.category}</h3>
                                                </div>
                                                <div className="flex flex-wrap justify-center gap-3">
                                                    {skillGroup.items.map((skill) => (
                                                        <span key={skill} className="px-4 py-2 bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-300 rounded-lg text-sm font-semibold border border-slate-200 dark:border-slate-700 shadow-sm">
                                                            {skill}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                        </Reveal>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {}
                        {/* Projects */}
                        <section id="projects" className="py-24 relative">
                            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                                <Reveal>
                                    <SectionTitle subtitle="Some of my recent work">Featured Projects</SectionTitle>
                                </Reveal>
                                
                                <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 mt-10">
                                    {PROJECTS.map((project, index) => (
                                        <ProjectCard key={index} project={project} index={index} />
                                    ))}
                                </div>
                            </div>
                        </section>

                        {}
                        {/* Contact */}
                        <section id="contact" className="py-24 relative overflow-hidden">
                            {/* Dark/Gradient Background strictly for Contact */}
                            <div className="absolute inset-0 bg-slate-900 dark:bg-black">
                                <div className="absolute inset-0 bg-gradient-to-b from-transparent to-indigo-900/40"></div>
                            </div>

                            <div className="max-w-4xl mx-auto px-4 relative z-10 text-center">
                                <Reveal>
                                    <h2 className="text-4xl md:text-5xl font-extrabold text-white mb-6 tracking-tight">Ready to collaborate?</h2>
                                    <p className="text-slate-300 text-lg md:text-xl mb-12 max-w-2xl mx-auto leading-relaxed">
                                        I'm actively seeking new opportunities and open to exciting projects. Whether you have a question or just want to connect, my inbox is always open.
                                    </p>
                                    
                                    <div className="flex flex-col sm:flex-row gap-5 justify-center items-center">
                                        <a href={`mailto:${EMAIL}`} className="w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl text-lg font-bold transition-all duration-300 shadow-lg shadow-indigo-600/30 hover:shadow-indigo-500/50 transform hover:-translate-y-1">
                                            <Mail size={22} /> Say Hello
                                        </a>
                                        <button onClick={copyEmail} className="w-full sm:w-auto inline-flex items-center justify-center gap-3 px-8 py-4 bg-white/10 hover:bg-white/20 text-white backdrop-blur-md border border-white/20 rounded-xl text-lg font-bold transition-all duration-300 transform hover:-translate-y-1">
                                            {emailCopied ? <Check size={22} className="text-green-400" /> : <Copy size={22} />} 
                                            {emailCopied ? "Email Copied!" : "Copy Email"}
                                        </button>
                                    </div>
                                </Reveal>

                                <div className="mt-24 pt-8 border-t border-slate-800 flex flex-col md:flex-row justify-between items-center gap-4">
                                    <p className="text-slate-400 font-medium">&copy; {CURRENT_YEAR} Devine Enukorah. All rights reserved.</p>
                                    <div className="flex gap-4">
                                        {SOCIALS.map((social) => (
                                            <a key={social.label} href={social.href} target="_blank" rel="noopener noreferrer" className="text-slate-400 hover:text-white transition-colors">
                                                <span className="sr-only">{social.label}</span>
                                                <social.icon size={20} />
                                            </a>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Back to top button */}
                        <button 
                            onClick={scrollToTop} 
                            aria-label="Scroll to top"
                            className={`fixed bottom-8 right-8 p-4 rounded-2xl bg-indigo-600 text-white shadow-xl shadow-indigo-500/30 hover:bg-indigo-500 hover:-translate-y-2 transition-all duration-300 z-40 ${showBackToTop ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-20 pointer-events-none'}`}
                        >
                            <ArrowUp size={24} strokeWidth={2.5} />
                        </button>

                    </div>
                </ErrorBoundary>
            );
        }

        // Mount Application
        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
